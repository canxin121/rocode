<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ROCode</title>
    <link rel="stylesheet" href="/web/app.css" />
  </head>
  <body>
    <div class="shell" id="appShell">

      <!-- ── SIDEBAR ──────────────────────────────────────────────── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">ROCode</span>
          <div class="sidebar-actions">
            <button id="sidebarToggle" class="sidebar-btn" title="Toggle Sidebar">
              <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 5h12M3 9h12M3 13h12"/></svg>
            </button>
            <button id="newSessionBtn" class="sidebar-btn" title="New Chat">
              <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 4v10M4 9h10"/></svg>
            </button>
          </div>
        </div>

        <div class="sidebar-search">
          <input id="projectSearch" type="text" placeholder="Search conversations…" />
        </div>

        <section class="session-list" id="projectTree">
          <!-- Session items will be rendered here -->
        </section>

        <footer class="sidebar-footer">
          <button id="settingsToggleBtn" class="sidebar-footer-btn" title="Settings">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.4"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42"/></svg>
            <span>Settings</span>
          </button>
        </footer>
      </aside>

      <!-- ── WORKSPACE ────────────────────────────────────────────── -->
      <main class="workspace">

        <!-- HERO (no session) -->
        <section id="heroPanel" class="hero">
          <div class="hero-logo">ROCode</div>
          <h1 id="heroGreeting">Good evening</h1>
          <p class="hero-subtitle">What can I help you build?</p>
          <div class="hero-actions">
            <button class="hero-chip" data-template="Scaffold a clean Rust module with tests.">Create module</button>
            <button class="hero-chip" data-template="Refactor this file for readability and performance.">Refactor</button>
            <button class="hero-chip" data-template="Investigate the failing tests and propose fixes.">Investigate</button>
          </div>
        </section>

        <!-- CONVERSATION -->
        <section id="conversationPanel" class="conversation hidden">
          <header class="conversation-header">
            <h3 id="sessionTitle" class="conversation-title">No session</h3>
            <div class="conversation-actions">
              <button id="overflowToggle" class="conversation-header-btn" title="Session actions">
                <svg viewBox="0 0 18 18" fill="currentColor"><circle cx="4" cy="9" r="1.3"/><circle cx="9" cy="9" r="1.3"/><circle cx="14" cy="9" r="1.3"/></svg>
              </button>
            </div>
            <!-- Dropdown menu (hidden by default) -->
            <div id="overflowMenu" class="hidden" style="position: absolute; top: 48px; right: 16px; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); z-index: var(--z-dropdown);">
              <button id="refreshSession" class="btn btn-ghost" style="width: 100%; justify-content: flex-start; border-radius: 0;">Refresh</button>
              <button id="forkSessionBtn" class="btn btn-ghost" style="width: 100%; justify-content: flex-start; border-radius: 0;">Fork</button>
              <button id="compactSessionBtn" class="btn btn-ghost" style="width: 100%; justify-content: flex-start; border-radius: 0;">Compact</button>
              <button id="renameSessionBtn" class="btn btn-ghost" style="width: 100%; justify-content: flex-start; border-radius: 0;">Rename</button>
              <button id="shareSessionBtn" class="btn btn-ghost" style="width: 100%; justify-content: flex-start; border-radius: 0;">Share</button>
              <div style="height: 1px; background: var(--border-subtle);"></div>
              <button id="deleteSessionBtn" class="btn btn-danger" style="width: 100%; justify-content: flex-start; border-radius: 0;">Delete</button>
            </div>
          </header>

          <div id="sessionRuntimeMeta" class="hidden" style="margin-bottom: var(--space-3);"></div>
          <div id="sessionMeta" class="hidden"></div>

          <section id="executionPanel" class="hidden" style="background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-4);"></section>
          <section id="recoveryPanel" class="hidden" style="background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-4);"></section>
          <section id="stageInspectorPanel" class="hidden" style="background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-4); margin-bottom: var(--space-4);"></section>

          <div id="messageFeed" class="message-feed"></div>
        </section>

        <!-- COMPOSER -->
        <section class="composer-shell">
          <form id="composerForm" class="composer">
            <textarea id="composerInput" rows="1" placeholder="Send a message…"></textarea>
            <div class="composer-footer">
              <div class="composer-meta">
                <span id="statusBadge" class="badge">Idle</span>
                <span class="composer-meta-item">
                  <span class="composer-meta-label">mode</span>
                  <span id="modeBadge">auto</span>
                </span>
                <span class="composer-meta-item">
                  <span class="composer-meta-label">model</span>
                  <span id="modelBadge">auto</span>
                </span>
                <span class="composer-meta-item">
                  <span class="composer-meta-label">dir</span>
                  <span id="directoryBadge">workspace</span>
                </span>
                <span id="tokenUsage" class="composer-meta-item">tokens: 0 / 0</span>
                <span id="commandHint" class="composer-meta-item">/help · /model · /agent</span>
              </div>
              <div class="composer-actions">
                <button id="cancelRunBtn" type="button" class="cancel-btn hidden">Cancel</button>
                <button id="sendButton" type="submit" class="send-btn" disabled>
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12V4M4 7l4-4 4 4"/></svg>
                </button>
              </div>
            </div>
          </form>
        </section>

        <!-- SETTINGS OVERLAY -->
        <section id="commandPanel" class="overlay hidden" role="dialog" aria-modal="true">
          <div class="modal">
            <header class="modal-header">
              <div>
                <h4 class="modal-title">Settings</h4>
                <div id="commandRuntimeStrip" style="display: flex; gap: var(--space-2); margin-top: var(--space-2);">
                  <span id="commandRuntimeBadge" class="badge">Ready</span>
                  <span id="commandRuntimeText" class="text-tertiary">Idle</span>
                </div>
              </div>
              <div style="display: flex; gap: var(--space-2);">
                <button id="commandAbortBtn" class="btn btn-danger hidden" type="button">Cancel</button>
                <button id="commandClose" class="btn btn-secondary">Close</button>
              </div>
            </header>
            <div class="modal-body">
              <div class="form-group">
                <label class="form-label">Model</label>
                <select id="modelSelect" class="form-select"></select>
              </div>
              <div class="form-group">
                <label class="form-label">Theme</label>
                <select id="themeSelect" class="form-select"></select>
              </div>
              <div class="form-group">
                <label class="form-label">Mode</label>
                <select id="agentSelect" class="form-select"></select>
              </div>
              <div class="form-group">
                <label class="form-label">Session Actions</label>
                <div style="display: grid; gap: var(--space-2); grid-template-columns: repeat(3, 1fr);">
                  <button id="commandSessionNewBtn" class="btn btn-secondary">New</button>
                  <button id="commandSessionForkBtn" class="btn btn-secondary">Fork</button>
                  <button id="commandSessionCompactBtn" class="btn btn-secondary">Compact</button>
                  <button id="commandSessionRenameBtn" class="btn btn-secondary">Rename</button>
                  <button id="commandSessionShareBtn" class="btn btn-secondary">Share</button>
                  <button id="commandSessionDeleteBtn" class="btn btn-danger">Delete</button>
                </div>
                <div id="commandSessionList" style="margin-top: var(--space-3); display: grid; gap: var(--space-2); max-height: 200px; overflow-y: auto;"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- Hidden commandBtn (app.js Ctrl+K still wires to this) -->
        <button id="commandBtn" class="hidden" aria-hidden="true">Commands</button>

        <!-- QUESTION PANEL -->
        <section id="questionPanel" class="overlay hidden" role="dialog" aria-modal="true">
          <div class="modal" style="max-width: 560px;">
            <header class="modal-header">
              <div>
                <h4 id="questionPanelTitle" class="modal-title">Answer Question</h4>
                <div style="display: flex; gap: var(--space-2); margin-top: var(--space-2);">
                  <span id="questionPanelStatus" class="badge">Pending</span>
                  <span id="questionPanelMeta" class="text-tertiary">Question</span>
                </div>
              </div>
              <div style="display: flex; gap: var(--space-2);">
                <button id="questionRejectBtn" class="btn btn-danger" type="button">Reject</button>
                <button id="questionClose" class="btn btn-secondary" type="button">Close</button>
              </div>
            </header>
            <form id="questionForm" class="modal-body" style="display: flex; flex-direction: column; gap: var(--space-4);">
              <div id="questionList" style="display: flex; flex-direction: column; gap: var(--space-3);"></div>
              <div style="display: flex; justify-content: flex-end;">
                <button id="questionSubmitBtn" class="btn btn-primary" type="submit">Submit Answers</button>
              </div>
            </form>
          </div>
        </section>

      </main>
    </div>

    <script src="/web/app.js" defer></script>
  </body>
</html>
